# ==============================
# CONFIGURACIÓN SPRING AGRICOLA
# ==============================

# Servidor
server.port=8080
server.servlet.context-path=/

# PostgreSQL - ⚠️ AJUSTA ESTAS CREDENCIALES CON TUS DATOS
spring.datasource.url=jdbc:postgresql://localhost:5432/sistema_agricola
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=sistema-agricola-cana-azucar-secret-key-256bits-seguro-2024
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Multipart (para imágenes de análisis)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logs
logging.level.com.agricola=DEBUG
logging.level.org.springframework.security=WARN
